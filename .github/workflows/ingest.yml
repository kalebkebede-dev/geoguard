name: Scheduled Ingestion

on:
  schedule:
    # Top of every hour, matching AirNow's own update cadence and the
    # HEALTHY_INTERVAL buffer in app/api/main.py's /health endpoint.
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scheduled ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
        run: python -m scripts.run_scheduled_ingestion
