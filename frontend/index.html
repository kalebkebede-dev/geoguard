<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoGuard — Air Quality Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>GeoGuard</h1>
    <p class="subtitle">Real-time air quality lookup and alerts</p>

    <div id="auth-panel">
      <form id="login-form" class="auth-form">
        <input type="email" id="email-input" placeholder="Email" required />
        <input type="password" id="password-input" placeholder="Password" required />
        <button type="submit" id="login-btn">Log in</button>
        <button type="button" id="signup-btn">Sign up</button>
        <span id="auth-error" class="error"></span>
      </form>
      <div id="logged-in-panel" class="hidden">
        Logged in as <strong id="logged-in-email"></strong>
        <button id="logout-btn">Log out</button>
      </div>
    </div>
  </header>

  <main>
    <div id="map"></div>

    <aside id="sidebar">
      <section id="lookup-panel">
        <h2>Current conditions</h2>
        <p class="hint">Click anywhere on the map to look up current AQI nearby.</p>
        <div id="lookup-result"></div>
        <button id="save-location-btn" class="hidden">Save this location</button>
      </section>

      <section id="saved-locations-panel" class="hidden">
        <h2>Saved locations</h2>
        <ul id="saved-locations-list"></ul>
      </section>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
